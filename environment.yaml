name: openghg_env
channels:
  - openghg
  - conda-forge
  - anaconda
dependencies:
  - python>=3.10
  - addict
  - cf_xarray
  - dask<2025.10
  - h5netcdf>=1.0.0,<2.0
  - filelock
  - matplotlib>=3.5,<4.0
  - msgpack-python>=1.0,<2.0
  - netcdf4>=1.6.0,<2.0
  - nbformat
  - numexpr
  - numpy  # Note numpy >= 2.0 is currently included as a pip requirement below
  - nc-time-axis
  - openghg_defs
  - openpyxl
  - pandas>=2.0,<3.0
  - pip
  - pint
  - pint-xarray
  - plotly
  - pyvis
  - rapidfuzz
  - requests>=2.25
  - setuptools
  - scipy>=1.10,<2.0
  - tinydb>=4.0,<5.0
  - toml>=0.10,<1.0
  - rich>=12.0,<14.0
  - ipywidgets
  - xarray>=2025.04.0,<2026.0.0
  - flox
  - urllib3>=1.26.3
  - xesmf>=0.7
  - zarr==2.18.3
  - numcodecs<0.16
  - sympy
  - networkx
  - openghg_calscales
  - pip:
    - icoscp
    - numpy>=2.0,<3.0
# numpy >= 2.0 is included in pip requirements because icoscp will try and downgrade numpy to <2.0
# - can remove and use definition above again when https://github.com/ICOS-Carbon-Portal/data/issues/391 is resolved.