name: OpenGHG tests

on:
  push:
    branches: [master, devel]
    tags:
      - "*"
    paths-ignore:
      - 'CHANGELOG.md'
  pull_request:
    branches: [master, devel]
    paths-ignore:
      - 'CHANGELOG.md'
  workflow_dispatch:

jobs:
  test:
    name: Run the tests
    runs-on: ${{ matrix.operating-system }}
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    strategy:
      max-parallel: 4
      fail-fast: false
      matrix:
        operating-system: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true

      - name: Install project (including dev dependencies)
        run: uv sync --all-extras --dev

      - name: Format code with black
        run: |
          uv run black --check openghg/

      - name: Lint with flake8
        run: |
          uv run flake8 openghg/ --count --statistics

      - name: Run mypy
        run: uv run mypy --python-version ${{ matrix.python-version }} openghg/

      - name: Create mock cdsapi config file
        run: |
          echo $'url: https://www.openghg.org\nkey: 00000:f5690ad7-test-test-test-6fb0573991ca\n' > ~/.cdsapirc
      - name: Install udunits package for CF compliance checks
        run: |
          sudo apt-get install libudunits2-0
      - name: Test with pytest
        run: |
          uv run pytest -v --run-cfchecks
  docs:
    name: Build and deploy the documentation
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags') && !contains(github.ref_name, '-') && contains(github.ref_name, '.')
    runs-on: ubuntu-latest
    needs: ["test"]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install uv
        uses: astral-sh/setup-uv@v2

      - name: Install project with doc extras
        run: uv sync --extra doc

      - name: Setup default config
        run: uv run openghg --default-config

      - name: Install pandoc
        run: sudo apt-get install -y pandoc

      - name: Build documentation
        run: |
          cd doc
          uv run make html
      - name: Deploy to GitHub pages
        uses: JamesIves/github-pages-deploy-action@v4.8.0
        with:
          branch: gh-pages
          folder: "doc/build/html"
          clean: true

