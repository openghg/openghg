  release_pypi:
    name: Build and publish Python distributions 📦 to PyPI (PEP 621, Trusted Publishing)
    runs-on: ubuntu-latest
    needs: ["test", "docs"]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-') && contains(github.ref_name, '.')
    environment:
      name: pypi
      url: https://pypi.org/p/openghg
    permissions:
      id-token: write  # Required for Trusted Publishing
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          version: "latest"

      - name: Build distributions with uv
        run: uv build

      - name: Publish
        run: uv publish --trusted-publishing always --dry-run

