# GitHub Copilot Configuration for OpenGHG
# This file enforces consistent usage of PR and issue templates

# Pull Request Template Configuration
# Use the default PR template located at .github/pull_request_template.md
pr_template:
  use_default: true

# Issue Template Configuration
# Use the default issue templates located in .github/ISSUE_TEMPLATE/
# Available templates: bug_report.yaml, new_feature.yaml, misc.yaml
issue_template:
  use_default: true
